apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: focusflow
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Miryz21/DevOps-2026
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
