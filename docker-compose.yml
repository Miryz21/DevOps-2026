version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: focusflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-devops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - focusflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: backend
    container_name: focusflow-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${PRIVATE_KEY}
      PUBLIC_KEY: ${PUBLIC_KEY}
      PRIVATE_KEY_PATH: ${PRIVATE_KEY_PATH}
      PUBLIC_KEY_PATH: ${PUBLIC_KEY_PATH}
    ports:
      - "5555:5555"
    networks:
      - focusflow-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: ${HOST:-http://localhost:5555}/api/v1
    container_name: focusflow-frontend
    ports:
      - "3000:80"
    networks:
      - focusflow-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  focusflow-network:
    driver: bridge
