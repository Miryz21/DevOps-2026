apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: focusflow-ingress
  namespace: focusflow
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend:latest
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend:latest
            port:
              number: 5555
