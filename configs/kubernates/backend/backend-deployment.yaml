apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: focusflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: cr.yandex/crp1ghkks5e8qc0ftr95/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5555
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: SECRET_KEY
            - name: PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: PUBLIC_KEY
          readinessProbe:
            httpGet:
              path: /docs
              port: 5555
            initialDelaySeconds: 40
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /docs
              port: 5555
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"