name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, lab1 ]
  pull_request:
    branches: [ main, develop, lab1 ]


jobs:

  # ================= BACKEND TEST =================

  test-back:
    name: Backend - Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install deps
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras

      - name: Run tests
        working-directory: ./backend
        run: ~/.local/bin/uv run pytest --cov=. --cov-report=xml


  # ================= BACKEND SONAR =================

  sonar-back:
    name: Backend - SonarQube
    runs-on: ubuntu-latest
    needs: test-back

    steps:
      - uses: actions/checkout@v4

      - name: Install sonar-scanner
        run: npm install -g sonar-scanner

      - name: SonarQube Backend
        working-directory: ./backend
        run: |
          sonar-scanner \
            -Dsonar.projectKey=backend \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.python.coverage.reportPaths=coverage.xml


  # ================= BACKEND BUILD =================

  build-back:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: sonar-back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras

      - name: Verify build
        working-directory: ./backend
        run: ~/.local/bin/uv run python -c "print('backend ok')"


  # ================= FRONTEND TEST =================

  test-front:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: build-back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install deps
        working-directory: ./frontend
        run: npm install

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --coverage


  # ================= FRONTEND SONAR =================

  sonar-front:
    name: Frontend - SonarQube
    runs-on: ubuntu-latest
    needs: test-front

    steps:
      - uses: actions/checkout@v4

      - name: Install sonar-scanner
        run: npm install -g sonar-scanner

      - name: SonarQube Frontend
        working-directory: ./frontend
        run: |
          sonar-scanner \
            -Dsonar.projectKey=frontend \
            -Dsonar.sources=src \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info


  # ================= FRONTEND BUILD =================

  build-front:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: sonar-front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install deps
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build


  # ================= DOCKER BACKEND =================

  push-back:
    name: Backend - Docker Push
    runs-on: ubuntu-latest
    needs: build-front

    steps:
      - uses: actions/checkout@v4

      - name: Login registry
        uses: docker/login-action@v4
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YANDEX_OAUTH_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/backend:latest


  # ================= DOCKER FRONTEND =================

  push-front:
    name: Frontend - Docker Push
    runs-on: ubuntu-latest
    needs: push-back

    steps:
      - uses: actions/checkout@v4

      - name: Login registry
        uses: docker/login-action@v4
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YANDEX_OAUTH_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/frontend:latest
