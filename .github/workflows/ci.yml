name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, lab1 ]
  pull_request:
    branches: [ main, develop, lab1 ]

jobs:

# ================= BACKEND TEST =================

  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras

      - name: Install test deps
        working-directory: ./backend
        run: ~/.local/bin/uv run pip install pytest-cov

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          ~/.local/bin/uv run pytest tests -v --tb=short \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml


# ================= BACKEND SONAR =================

  backend-sonar:
    name: Backend - SonarQube
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Install sonar scanner
        run: |
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run Sonar analysis
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=backend \
            -Dsonar.sources=. \
            -Dsonar.exclusions=tests/** \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.python.coverage.reportPaths=coverage.xml \
            -Dsonar.working.directory=.scannerwork

      - name: Wait for CE task
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          CE_TASK_ID=$(grep '^ceTaskId=' .scannerwork/report-task.txt | cut -d'=' -f2)

          echo "CE task: $CE_TASK_ID"

          MAX=60
          i=0

          while true; do
            RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
              "${{ secrets.SONAR_HOST_URL }}/api/ce/task?id=$CE_TASK_ID")

            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')

            echo "CE status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId')
              echo "ANALYSIS_ID=$ANALYSIS_ID" >> $GITHUB_ENV
              break
            fi

            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              exit 1
            fi

            i=$((i+1))
            if [ "$i" -ge "$MAX" ]; then
              exit 1
            fi

            sleep 5
          done

      - name: Check Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?analysisId=$ANALYSIS_ID")

          STATUS=$(echo "$RESPONSE" | jq -r '.projectStatus.status')

          echo "Quality Gate: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            exit 1
          fi


# ================= BACKEND BUILD =================

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-sonar
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install deps
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras


# ================= FRONTEND TEST =================

  frontend-test:
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install deps
        working-directory: ./frontend
        run: npm install

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --run --coverage

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info


# ================= FRONTEND SONAR =================

  frontend-sonar:
    runs-on: ubuntu-latest
    needs: frontend-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend

      - name: Install sonar scanner
        run: |
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run Sonar analysis
        working-directory: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=frontend \
            -Dsonar.sources=src \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Wait CE task
        working-directory: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          CE_TASK_ID=$(grep '^ceTaskId=' .scannerwork/report-task.txt | cut -d'=' -f2)

          while true; do
            RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
              "${{ secrets.SONAR_HOST_URL }}/api/ce/task?id=$CE_TASK_ID")

            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')

            echo "CE status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId')
              echo "ANALYSIS_ID=$ANALYSIS_ID" >> $GITHUB_ENV
              break
            fi

            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              exit 1
            fi

            sleep 5
          done

      - name: Check Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?analysisId=$ANALYSIS_ID")

          STATUS=$(echo "$RESPONSE" | jq -r '.projectStatus.status')

          echo "Quality Gate: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            exit 1
          fi


# ================= FRONTEND BUILD =================

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-sonar
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install deps
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build
