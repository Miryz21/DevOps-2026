name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, lab1 ]
  pull_request:
    branches: [ main, develop, lab1 ]

jobs:

  # ==================== BACKEND TEST ====================

  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv package manager
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          ~/.local/bin/uv sync --all-extras

      - name: Install test dependencies
        working-directory: ./backend
        run: |
          ~/.local/bin/uv sync --all-extras
          ~/.local/bin/uv run pip install pytest-cov

      - name: Run tests
        working-directory: ./backend
        run: |
          ~/.local/bin/uv run pytest tests/test_core_logic.py -v --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term


  # ==================== BACKEND SONAR ====================

  backend-sonar:
    name: Backend - SonarQube
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Sonar Scanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run SonarQube (Backend)
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=backend \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml


  # ==================== BACKEND BUILD ====================

  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: backend-sonar
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv package manager
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: |
          ~/.local/bin/uv sync --all-extras

      - name: Verify dependencies
        working-directory: ./backend
        run: |
          ~/.local/bin/uv run python -c "import fastapi; import sqlmodel; print('Dependencies OK')"


  # ==================== FRONTEND TEST ====================

  frontend-test:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- tests/core-logic.test.tsx --run


  # ==================== FRONTEND SONAR ====================

  frontend-sonar:
    name: Frontend - SonarQube
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Sonar Scanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run SonarQube (Frontend)
        working-directory: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
              -Dsonar.projectKey=frontend \
              -Dsonar.branch.name=main \
              -Dsonar.sources=src \
              -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
              -Dsonar.login=$SONAR_TOKEN


  # ==================== FRONTEND BUILD ====================

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build project
        working-directory: ./frontend
        run: npm run build


  # ==================== BACKEND DOCKER ====================

  backend-push-docker:
    name: Backend - Build and Push Docker
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v4
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YANDEX_OAUTH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/backend:latest


  # ==================== FRONTEND DOCKER ====================

  frontend-push-docker:
    name: Frontend - Build and Push Docker
    runs-on: ubuntu-latest
    needs: backend-push-docker

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v4
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YANDEX_OAUTH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_HOST }}/api/v1
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/frontend:latest
