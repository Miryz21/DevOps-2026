name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, lab1 ]
  pull_request:
    branches: [ main, develop, lab1 ]

jobs:

# ================= BACKEND TEST =================

  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras

      - name: Install test deps
        working-directory: ./backend
        run: ~/.local/bin/uv run pip install pytest-cov

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          ~/.local/bin/uv run pytest tests -v --tb=short \
            --cov=src \
            --cov=security \
            --cov=main.py \
            --cov-report=xml:coverage.xml \
            --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml


# ================= BACKEND SONAR =================

  backend-sonar:
    name: Backend - SonarQube
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Install sonar scanner
        run: |
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run Sonar analysis
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=backend \
            -Dsonar.sources=. \
            -Dsonar.exclusions=tests/** \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.python.coverage.reportPaths=coverage.xml \
            -Dsonar.working.directory=.scannerwork

      - name: Wait for CE task
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          CE_TASK_ID=$(grep '^ceTaskId=' .scannerwork/report-task.txt | cut -d'=' -f2)

          MAX=60
          i=0

          while true; do
            RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
              "${{ secrets.SONAR_HOST_URL }}/api/ce/task?id=$CE_TASK_ID")

            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')

            if [ "$STATUS" = "SUCCESS" ]; then
              ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId')
              echo "ANALYSIS_ID=$ANALYSIS_ID" >> $GITHUB_ENV
              break
            fi

            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              exit 1
            fi

            i=$((i+1))
            if [ "$i" -ge "$MAX" ]; then exit 1; fi

            sleep 5
          done

      - name: Check Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?analysisId=$ANALYSIS_ID")

          STATUS=$(echo "$RESPONSE" | jq -r '.projectStatus.status')

          if [ "$STATUS" != "OK" ]; then
            exit 1
          fi


# ================= BACKEND BUILD =================

  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: backend-sonar
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras

      - name: Sanity check
        working-directory: ./backend
        run: |
          ~/.local/bin/uv run python -c "import main; print('backend OK')"


# ================= FRONTEND TEST =================

  frontend-test:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install coverage provider
        working-directory: ./frontend
        run: npm install -D @vitest/coverage-v8@2.1.9

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npx vitest run --coverage

      - name: Verify coverage files
        working-directory: ./frontend
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "lcov.info found"
          else
            echo "ERROR: lcov.info not found"
            exit 1
          fi
          
          if [ -f coverage/test-results.xml ]; then
            echo "test-results.xml found"
          else
            echo "WARNING: test-results.xml not found"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/lcov.info
            frontend/coverage/test-results.xml
          if-no-files-found: error

# ================= FRONTEND SONAR =================

  frontend-sonar:
    name: Frontend - SonarQube
    runs-on: ubuntu-latest
    needs: frontend-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend

      - name: Install sonar scanner
        run: |
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run Sonar analysis
        working-directory: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=frontend \
            -Dsonar.sources=src \
            -Dsonar.tests=src \
            -Dsonar.test.inclusions="**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx" \
            -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts" \
            -Dsonar.coverage.exclusions="**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/index.ts,**/vitest.setup.ts" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.testExecutionReportPaths=coverage/test-results.xml \
            -Dsonar.typescript.tsconfigPath=tsconfig.json \
            -Dsonar.working.directory=.scannerwork

      - name: Wait for CE task
        working-directory: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          CE_TASK_ID=$(grep '^ceTaskId=' .scannerwork/report-task.txt | cut -d'=' -f2)

          MAX=60
          i=0

          while true; do
            RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
              "${{ secrets.SONAR_HOST_URL }}/api/ce/task?id=$CE_TASK_ID")

            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')

            if [ "$STATUS" = "SUCCESS" ]; then
              ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId')
              echo "ANALYSIS_ID=$ANALYSIS_ID" >> $GITHUB_ENV
              break
            fi

            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              exit 1
            fi

            i=$((i+1))
            if [ "$i" -ge "$MAX" ]; then exit 1; fi

            sleep 5
          done

      - name: Check Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?analysisId=$ANALYSIS_ID")

          STATUS=$(echo "$RESPONSE" | jq -r '.projectStatus.status')

          if [ "$STATUS" != "OK" ]; then
            exit 1
          fi


# ================= FRONTEND BUILD =================

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-sonar
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build


# ================= DOCKER BUILD & PUSH =================

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v4
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YANDEX_OAUTH_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/frontend:${{ github.sha }}


# ================= GITOPS UPDATE =================

  update-gitops:
    name: Update GitOps (Argo CD sync trigger)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup git auth
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Update backend image
        run: |
          sed -i "s|cr.yandex/${{ secrets.REGISTRY_ID }}/backend:.*|cr.yandex/${{ secrets.REGISTRY_ID }}/backend:${{ github.sha }}|g" k8s/backend/deployment.yaml

      - name: Update frontend image
        run: |
          sed -i "s|cr.yandex/${{ secrets.REGISTRY_ID }}/frontend:.*|cr.yandex/${{ secrets.REGISTRY_ID }}/frontend:${{ github.sha }}|g" k8s/frontend/deployment.yaml

      - name: Commit and push GitOps update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/

          git commit -m "chore(gitops): update images to ${{ github.sha }}" || echo "no changes"

          git push
