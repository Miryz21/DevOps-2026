name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, lab1 ]
  pull_request:
    branches: [ main, develop, lab1 ]

jobs:

  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras

      - name: Install test dependencies
        working-directory: ./backend
        run: ~/.local/bin/uv run pip install pytest-cov

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          ~/.local/bin/uv run pytest tests/test_core_logic.py -v --tb=short \
            --cov=src \
            --cov-report=xml:coverage.xml


  backend-sonar:
    name: Backend - SonarQube
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Install sonar scanner
        run: |
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run SonarQube analysis
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=backend \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: Check Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          STATUS=$(curl -s -u $SONAR_TOKEN: \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=backend" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            exit 1
          fi


  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: backend-sonar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        working-directory: ./backend
        run: ~/.local/bin/uv sync --all-extras

      - name: Verify dependencies
        run: python -c "import fastapi, sqlmodel"


  frontend-test:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - working-directory: ./frontend
        run: npm install

      - working-directory: ./frontend
        run: npm test -- --run


  frontend-sonar:
    name: Frontend - SonarQube
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Install sonar scanner
        run: |
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          echo "$PWD/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run SonarQube analysis
        working-directory: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=frontend \
            -Dsonar.sources=src \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN

      - name: Check Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          STATUS=$(curl -s -u $SONAR_TOKEN: \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=frontend" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            exit 1
          fi


  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-sonar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - working-directory: ./frontend
        run: npm install

      - working-directory: ./frontend
        run: npx tsc --noEmit

      - working-directory: ./frontend
        run: npm run build


  backend-push-docker:
    name: Backend - Build and Push Docker
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YANDEX_OAUTH_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/backend:latest


  frontend-push-docker:
    name: Frontend - Build and Push Docker
    runs-on: ubuntu-latest
    needs: backend-push-docker

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.YANDEX_OAUTH_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-args: |
            VITE_API_URL=${{ secrets.BACKEND_HOST }}/api/v1
          push: true
          tags: cr.yandex/${{ secrets.REGISTRY_ID }}/frontend:latest
